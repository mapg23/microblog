apiVersion: apps/v1
kind: Deployment
metadata:
  name: microblog
spec:
  replicas: 2
  selector:
    matchLabels:
      app: microblog
  template:
    metadata:
      labels:
        app: microblog
    spec:
      containers:
        - name: microblog
          image: maacke16/microblog:14.0.13-prod
          imagePullPolicy: Always
          env:
            - name: SECRET_KEY
              value: "my-secret-key"
            - name: DATABASE_URL
              value: mysql+pymysql://microblog:password@mysql/microblog
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
            limits:
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: microblog
spec:
  selector:
    app: microblog
  ports:
    - port: 80
      targetPort: 5000
